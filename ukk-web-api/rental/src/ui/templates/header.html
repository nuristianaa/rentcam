<head>

  <meta http-equiv="content-type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="[[app_url]]/ui/build-app.css?v=[[ver]]">
  <link rel="stylesheet" href="[[app_url]]/ui/build-vendor.css?v=[[ver]]">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    @import url(https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap);

    @font-face {
      font-family: 'Inter';
      font-style: normal;
      font-weight: 400;
      src: url('https://fonts.gstatic.com/s/inter/v12/UcCO3FwrKxltVYqzQmH6cvxI.ttf') format('truetype');
    }

    html {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
    }
    .modal-content {
      max-height: 75vh;
    }
    .modal-body {
      overflow-y: auto;
    }
    @media print {
      @font-face {
        font-family: 'Inter';
        font-style: normal;
        font-weight: 400;
        src: url('https://fonts.gstatic.com/s/inter/v12/UcCO3FwrKxltVYqzQmH6cvxI.ttf') format('truetype');
      }

      body {
        margin: 0;
      }

      .col-border {
        border: 0.1px solid black;
      }

      .col-border-sides {
        border-left: 0.1px solid #000;
        border-right: 0.1px solid #000;
        border-top: none;
        border-bottom: none;
      }
      .col-border-sides-bottom {
        border-left: 0.1px solid #000;
        border-right: 0.1px solid #000;
        border-top: none;
        border-bottom: 0.1px solid #000;;
      }

      .col-editable {
        background-color: #000080 !important;
        color: #fff !important;
      }

      table {
        page-break-inside: auto;
        width: 100%;
        font-size: 10px;
        border-collapse: collapse;
      }

      tr {
        page-break-inside: avoid;
        page-break-after: auto;
      }

      /* th, td {
        font-size: 10px !important;
        padding: 2px !important;
      } */

      .colored-header {
        background-color: #dbcebf !important;
        color: black !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      

    }
  </style>
