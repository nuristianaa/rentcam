  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  <link rel="stylesheet" type="text/css" href="[[app_url]]/ui/quasar/quasar.css?v=[[ver]]">
  <link rel="stylesheet" type="text/css" href="[[app_url]]/ui/quasar/custom.css?v=[[ver]]">

  <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-draw/dist/leaflet.draw.css">
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://rawgit.com/bbecquet/Leaflet.RotatedMarker/master/leaflet.rotatedMarker.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
  <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.fullscreen/Control.FullScreen.css" />
  <script src="https://unpkg.com/leaflet.fullscreen/Control.FullScreen.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />
  <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

  <style>
      html {
        font-size: 12px;
      }
      .modal-content {
        max-height: 75vh;
      }
      .modal-body {
        overflow-y: auto;
      }
      .bottom-modal .modal-dialog {
        position: fixed;
        bottom: -100%;
        left: 0;
        right: 0;
        margin: auto;
        transition: bottom 0.4s ease-in-out;
      }

      .bottom-modal.show .modal-dialog {
        bottom: 0;
      }
      .custom-label { font-size: 12px; font-weight: bold; background-color: #2773ee; color: white; padding: 3px; border: 1px solid #ccc; }
      .geofence-tooltip { background-color: #4a86e7; border-radius: 5px; color: white; user-select: none; pointer-events: none; }
      .geofence-label { font-weight: 700 !important; color: rgb(0, 13, 255) !important; }
      .leaflet-tooltip {
          background: white !important;
          border: none !important;
          box-shadow: none !important;
          color: black;
          font-weight: bold;
          font-size: 9.5px;
          padding: 0;
          padding-left: 2px;
          padding-right: 2px;
      }
      .truncate {
          width: 100%;            /* Set the width of the container */
          height: 50px;            /* Set the width of the container */
          white-space: nowrap;     /* Prevent text from wrapping */
          overflow: hidden;        /* Hide the overflowing text */
          text-overflow: ellipsis; /* Add ellipsis (...) */
          border: 1px solid #ccc; /* Just for visibility */
          padding: 5px;
      }
      .leaflet-control-attribution {
          display: none !important;
      }
  </style>
</head>
<body>
  <script src="[[app_url]]/ui/quasar/vue.js?v=[[ver]]"></script>
